
services:
  db:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: AmirSamyan
      POSTGRES_PASSWORD: 123456789
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  django:
    image: django
    container_name: helen_pos
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "python manage.py makemigrations && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      
      DB_NAME: mydb
      DB_USER: AmirSamyan
      DB_PASSWORD: 123456789
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      - db  

volumes:
  postgres_data:   
    